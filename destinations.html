<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destinations — Veloura Travels</title>
  <meta name="description"
    content="Explore handcrafted travel packages across Asia, the Middle East, and Europe with Veloura Travels.">

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="index.html"><img src="image/logo.png" alt="Veloura Travels" height="45" style="object-fit:contain;"></a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active-nav" href="destinations.html">Destinations</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="booknow.html">Book Now</a></li>
      </ul>
    </div>
  </nav>

  <div class="dest-hero">
    <h2 class="fade-up">Our Packages</h2>
    <p class="fade-up delay-1">Explore handcrafted travel experiences around the world</p>
  </div>

  <div class="filter-bar">
    <div class="container text-center">
      <button class="filter-btn active" data-region="all">All</button>
      <button class="filter-btn" data-region="asia">Asia</button>
      <button class="filter-btn" data-region="middle-east">Middle East</button>
      <button class="filter-btn" data-region="europe">Europe</button>
    </div>
  </div>

  <div class="dest-grid">
    <div class="container">
      <div class="row" id="dest-pkg-grid">

      </div>
    </div>
  </div>

  <div class="pkg-modal-overlay" id="pkgModal">
    <div class="pkg-modal">
      <button class="pkg-modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <img id="modal-img" src="" alt="">
      <div class="pkg-modal-body">
        <p id="modal-region"
          style="font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;"></p>
        <h3 id="modal-name"></h3>
        <div class="modal-detail-row">
          <div class="modal-detail"><i class="fas fa-clock"></i><span id="modal-days"></span></div>
          <div class="modal-detail"><i class="fas fa-plane"></i><span id="modal-dep"></span></div>
          <div class="modal-detail"><i class="fas fa-rupee-sign"></i><span id="modal-price"></span></div>
        </div>
        <p id="modal-desc" style="color:var(--muted);font-size:.9rem;line-height:1.7;margin-top:.5rem;"></p>
        <div class="modal-includes">
          <h6>What's Included</h6>
          <ul id="modal-includes" style="list-style:none;padding:0;"></ul>
        </div>
        <a href="booknow.html" class="btn-gold mt-3" onclick="closeModal()">Book This Package</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-bottom text-center">
        <p>© 2025 Veloura Travels Co. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="script.js"></script>

</body>

</html>
